<!DOCTYPE html>
<html lang="en">

<title>Colombian Spanish Phrase Book</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;

  .subtitle { color: rgba(255,255,255,0.85); font-size: 0.82rem; margin-bottom: 16px; }

  /* Direction toggle */
  .dir-toggle {
    display: flex; gap: 8px; margin-bottom: 16px; background: rgba(255,255,255,0.2);
    border-radius: 25px; padding: 4px;
  }
  .dir-btn {
    padding: 8px 18px; border-radius: 22px; border: none; cursor: pointer;
    font-weight: 700; font-size: 0.88rem; transition: all 0.2s;
    background: transparent; color: white;
  }
  .dir-btn.active { background: white; color: #003893; }

  /* Search */
  .search-bar {
    width: 100%; max-width: 460px; margin-bottom: 16px; position: relative;
  }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 42px; border-radius: 25px;
    border: none; font-size: 1rem; outline: none;
    background: rgba(255,255,255,0.95); color: #333;
  }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; }

  /* Categories */
  .cat-row {
    display: flex; gap: 8px; overflow-x: auto; padding: 0 0 12px;
    width: 100%; max-width: 460px; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: none;
    cursor: pointer; font-weight: 700; font-size: 0.82rem; white-space: nowrap;
    background: rgba(255,255,255,0.25); color: white; transition: all 0.2s;
  }
  .cat-pill.active { background: white; color: #003893; }

  /* Phrase list */
  .phrase-list {
    width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 10px;
    padding-bottom: 40px;
  }
  .phrase-card {
    background: rgba(255,255,255,0.97); border-radius: 16px; padding: 14px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.12); cursor: pointer; transition: all 0.15s;
  }
  .phrase-card:active { transform: scale(0.98); }
  .phrase-card.speaking { box-shadow: 0 0 0 3px #FCD116, 0 3px 12px rgba(0,0,0,0.12); }
  .phrase-en { font-size: 0.95rem; color: #2c3e50; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
  .phrase-es { font-size: 1.1rem; color: #003893; font-weight: 700; line-height: 1.4; display: flex; align-items: center; gap: 8px; }
  .phrase-es .speak-icon { font-size: 1.2rem; flex-shrink: 0; }
  .phrase-tag { font-size: 0.65rem; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .no-results { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.95rem; padding: 30px; }

  /* Now speaking banner */
  .now-speaking {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(135deg, #003893, #CE1126);
    color: white; padding: 14px 20px; display: none;
    align-items: center; justify-content: center; gap: 10px;
    font-weight: 700; font-size: 0.9rem; z-index: 100;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
  }
  .now-speaking.show { display: flex; }
  .now-speaking .wave { font-size: 1.2rem; animation: wave 0.8s infinite; }
  @keyframes wave { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

  /* Save hint */
  .save-hint {
    width: 100%; max-width: 460px; background: rgba(255,255,255,0.15);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 16px;
    color: rgba(255,255,255,0.9); font-size: 0.78rem; line-height: 1.5;
  }
  .save-hint b { color: white; }

  /* Add Phrase Button */
  .add-phrase-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px;
    padding: 14px;
    background: linear-gradient(135deg, #003893, #CE1126);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .add-phrase-btn:active { opacity: 0.85; }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: #2c3e50;
    margin-bottom: 16px;
    text-align: center;
  }
  .modal-label {

    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    margin-top: 12px;
  }
  .modal-input, .modal-select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 1rem;
    color: #2c3e50;

  .modal-btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .modal-cancel {

    border-radius: 12px; font-size: 0.95rem; font-weight: 700;
    color: #666; cursor: pointer;
  }
  .modal-save {
    flex: 2; padding: 13px;
    background: linear-gradient(135deg, #003893, #CE1126);
    border: none; border-radius: 12px;
    font-size: 0.95rem; font-weight: 700; color: white; cursor: pointer;
  }
  .modal-save:active, .modal-cancel:active { opacity: 0.8; }
  .modal-error { color: #CE1126; font-size: 0.82rem; margin-top: 8px; text-align: center; min-height: 18px; }

  /* Custom phrase delete button */
  .delete-phrase {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none;
    color: #ccc; font-size: 1rem; cursor: pointer;
    padding: 4px 6px; border-radius: 8px;
    line-height: 1;
  }
  .delete-phrase:active { color: #CE1126; }
  .custom-badge {
    display: inline-block;
    background: #f0f4ff;
    color: #003893;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 6px;
    margin-left: 6px;
    letter-spacing: 0.5px;

<p class="subtitle">Nursing Home & Care • Works Offline</p>

    <div class="modal-error" id="modalError"></div>

  </div>
</div>

<div class="now-speaking" id="nowSpeaking">

// ===== STATE =====
let direction = 'en-es';
let activeCat = 'All';
let searchQuery = '';

// Load custom phrases from localStorage
function loadCustomPhrases() {
  try {
    return JSON.parse(localStorage.getItem('customPhrases') || '[]');
  } catch { return []; }
}
function saveCustomPhrasesToStorage(arr) {
  localStorage.setItem('customPhrases', JSON.stringify(arr));
}

let CUSTOM_PHRASES = loadCustomPhrases();

function getAllPhrases() {
  return [...PHRASES, ...CUSTOM_PHRASES];
}

function getCategories() {
  const all = getAllPhrases();
  const cats = ['All', ...Array.from(new Set(all.map(p => p.cat)))];
  // Ensure "My Phrases" always shows if there are custom phrases
  if (CUSTOM_PHRASES.length > 0 && !cats.includes('My Phrases')) {
    cats.push('My Phrases');
  }
  return cats;
}

// ===== INIT =====
function init() {
  renderCategories();
  renderPhrases();
  // Preload voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  // Unlock speech on first touch (Android)
  document.addEventListener('touchstart', function unlock() {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    }
    document.removeEventListener('touchstart', unlock);
  }, { once: true });
}

function renderCategories() {
  const row = document.getElementById('catRow');
  row.innerHTML = getCategories().map(cat =>
    `<button class="cat-pill ${cat === activeCat ? 'active' : ''}" onclick="setCat('${cat.replace(/'/g, "\\'")}')">${cat}</button>`
  ).join('');
}

function setCat(cat) {
  activeCat = cat;
  renderCategories();
  renderPhrases();
}

function setDir(dir) {
  direction = dir;
  document.querySelectorAll('.dir-btn').forEach((b, i) =>
    b.classList.toggle('active', (i === 0 && dir === 'en-es') || (i === 1 && dir === 'es-en'))
  );
  renderPhrases();
}

function renderPhrases() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('phraseList');
  const all = getAllPhrases();

  let filtered = all;
  if (activeCat !== 'All') filtered = filtered.filter(p => p.cat === activeCat);
  if (searchQuery) filtered = filtered.filter(p =>
    p.en.toLowerCase().includes(searchQuery) || p.es.toLowerCase().includes(searchQuery)
  );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No phrases found. Try a different search.</div>';
    return;
  }

  const isEnEs = direction === 'en-es';
  list.innerHTML = filtered.map((p) => {
    const isCustom = !!p.custom;
    const primary = isEnEs ? p.en : p.es;
    const secondary = isEnEs ? p.es : p.en;
    const primaryLang = isEnEs ? '🇺🇸' : '🇨🇴';
    const secondaryLang = isEnEs ? '🇨🇴' : '🇺🇸';
    const deleteBtn = isCustom
      ? `<button class="delete-phrase" onclick="event.stopPropagation();deleteCustomPhrase('${p.id}')" title="Delete">✕</button>`
      : '';
    const customBadge = isCustom ? '<span class="custom-badge">MY PHRASE</span>' : '';
    return `
      <div class="phrase-card" style="position:relative;" onclick="speakPhraseText('${secondary.replace(/'/g, "\'")}', '${isEnEs ? 'es-ES' : 'en-US'}')">
        ${deleteBtn}
        <div class="phrase-tag">${p.cat}${customBadge}</div>
        <div class="phrase-en">${primaryLang} ${primary}</div>
        <div class="phrase-es"><span class="speak-icon">🔊</span>${secondaryLang} ${secondary}</div>
      </div>
    `;
  }).join('');
}

function speakPhraseText(text, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.rate = 0.85;
    utter.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v => v.lang === lang) ||
                  voices.find(v => v.lang.startsWith(lang.substring(0, 2))) ||
                  voices.find(v => v.default);
    if (match) utter.voice = match;
    utter.onstart = () => {
      document.getElementById('speakingText').textContent = text;
      document.getElementById('nowSpeaking').classList.add('show');
    };
    utter.onend = () => { document.getElementById('nowSpeaking').classList.remove('show'); };
    utter.onerror = () => { document.getElementById('nowSpeaking').classList.remove('show'); };
    window.speechSynthesis.speak(utter);
  }, 150);
}

// ===== CUSTOM PHRASE MANAGEMENT =====
function openAddModal() {
  document.getElementById('newEn').value = '';
  document.getElementById('newEs').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('addModal').classList.add('show');
}
function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}
function closeModalIfOutside(e) {
  if (e.target === document.getElementById('addModal')) closeModal();
}
function saveCustomPhrase() {
  const en = document.getElementById('newEn').value.trim();
  const es = document.getElementById('newEs').value.trim();
  const cat = document.getElementById('newCat').value;
  const errEl = document.getElementById('modalError');

  if (!en) { errEl.textContent = 'Please enter the English phrase.'; return; }
  if (!es) { errEl.textContent = 'Please enter the Spanish translation.'; return; }

  const newPhrase = {
    cat,
    en,
    es,
    custom: true,
    id: 'c_' + Date.now()
  };
  CUSTOM_PHRASES.push(newPhrase);
  saveCustomPhrasesToStorage(CUSTOM_PHRASES);
  closeModal();
  activeCat = cat; // Switch to the category we just added to
  renderCategories();
  renderPhrases();
}
function deleteCustomPhrase(id) {
  if (!confirm('Delete this phrase?')) return;
  CUSTOM_PHRASES = CUSTOM_PHRASES.filter(p => p.id !== id);
  saveCustomPhrasesToStorage(CUSTOM_PHRASES);
  renderCategories();
  renderPhrases();
}

init();
</script>
